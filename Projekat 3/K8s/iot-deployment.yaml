
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-service
  namespace: iot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-service
  template:
    metadata:
      labels:
        app: iot-service
    spec:
      containers:
      - name: iot-service
        image: dockercompose-iot-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: DB_HOST
          value: postgres-iot
