
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-service
  namespace: iot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-service
  template:
    metadata:
      labels:
        app: iot-service
    spec:
      containers:
      - name: iot-service
        image: dockercompose-iot-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: DB_HOST
          value: postgres-iot
        - name: POSTGRES_USER
          value: user
        - name: POSTGRES_PASSWORD
          value: pass
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: iotdb
