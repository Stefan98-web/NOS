
apiVersion: v1
kind: Service
metadata:
  name: iot-service
  namespace: iot-demo
spec:
  type: NodePort
  selector:
    app: iot-service
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30007
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: iot-demo
spec:
  type: NodePort
  selector:
    app: analytics-service
  ports:
  - port: 80
    targetPort: 8001
    nodePort: 30008
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-iot
  namespace: iot-demo
spec:
  clusterIP: None
  selector:
    app: postgres-iot
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-analytics
  namespace: iot-demo
spec:
  clusterIP: None
  selector:
    app: postgres-analytics
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: iot-demo
spec:
  selector:
    app: rabbitmq
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
