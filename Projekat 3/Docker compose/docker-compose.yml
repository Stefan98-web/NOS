version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres-iot:
    image: postgres:15
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"

  postgres-analytics:
    image: postgres:15
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5434:5432"

  iot-service:
    build: ./iot-service
    ports:
      - "8000:8000"
    depends_on:
      - postgres-iot
      - rabbitmq

  analytics-service:
    build: ./analytics-service
    ports:
      - "8001:8001"
    depends_on:
      - postgres-analytics
      - rabbitmq
